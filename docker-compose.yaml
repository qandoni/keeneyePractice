services:
  myapp-postgres:
    image: postgres:18.3-bookworm
    container_name: myapp-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always
  
  myapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations
  
  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: myapp-postgres-port-forwarder
    command: TCP-LISTEN:5432,reuseaddr,fork TCP:myapp-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - default